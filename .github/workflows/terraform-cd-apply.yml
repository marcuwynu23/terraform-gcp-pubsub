name: CD - GCP Pub/Sub (Apply)

on:
  workflow_dispatch:
    inputs:

      project_id:
        description: GCP project ID
        required: true
        type: string

      region:
        description: "GCP region (Free Tier: us-west1, us-central1, us-east1)"
        required: true
        type: string
        default: us-central1

      topic_name:
        description: topic name
        required: true
        type: string

      message_retention_duration:
        description: message retention duration
        required: true
        type: string

      labels:
        description: labels
        required: true
        type: string

      subscription_name:
        description: subscription name
        required: true
        type: string

      ack_deadline_seconds:
        description: ack deadline seconds
        required: true
        type: string

      push_endpoint:
        description: push endpoint
        required: true
        type: string

      push_attributes:
        description: push attributes
        required: true
        type: string

      expiration_ttl:
        description: expiration ttl
        required: true
        type: string

      min_retry_backoff:
        description: min retry backoff
        required: true
        type: string

      max_retry_backoff:
        description: max retry backoff
        required: true
        type: string

      enable_message_ordering:
        description: enable message ordering
        required: true
        type: string

env:
  TF_BUCKET_NAME: ${{ secrets.TF_BUCKET_NAME }}
  TF_BUCKET_PREFIX: ${{ secrets.TF_BUCKET_PREFIX }}
jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: latest
    - name: Ensure GCS State Bucket Exists
      run: |
        gcloud storage buckets describe gs://$TF_BUCKET_NAME --format="json" 2>/dev/null || \
        gcloud storage buckets create gs://$TF_BUCKET_NAME \
          --location=${{ github.event.inputs.region }} \
          --uniform-bucket-level-access
    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="bucket=$TF_BUCKET_NAME" \
          -backend-config="prefix=$TF_BUCKET_PREFIX"
    - name: Terraform Plan
      run: |
        terraform plan  \
          -var="project_id=${{ github.event.inputs.project_id }}" \
          -var="region=${{ github.event.inputs.region }}" \
          -var="topic_name=${{ github.event.inputs.topic_name }}" \
          -var="message_retention_duration=${{ github.event.inputs.message_retention_duration }}" \
          -var="labels=${{ github.event.inputs.labels }}" \
          -var="subscription_name=${{ github.event.inputs.subscription_name }}" \
          -var="ack_deadline_seconds=${{ github.event.inputs.ack_deadline_seconds }}" \
          -var="push_endpoint=${{ github.event.inputs.push_endpoint }}" \
          -var="push_attributes=${{ github.event.inputs.push_attributes }}" \
          -var="expiration_ttl=${{ github.event.inputs.expiration_ttl }}" \
          -var="min_retry_backoff=${{ github.event.inputs.min_retry_backoff }}" \
          -var="max_retry_backoff=${{ github.event.inputs.max_retry_backoff }}" \
          -var="enable_message_ordering=${{ github.event.inputs.enable_message_ordering }}"
    - name: Terraform Apply
      run: |
        terraform apply -auto-approve  \
          -var="project_id=${{ github.event.inputs.project_id }}" \
          -var="region=${{ github.event.inputs.region }}" \
          -var="topic_name=${{ github.event.inputs.topic_name }}" \
          -var="message_retention_duration=${{ github.event.inputs.message_retention_duration }}" \
          -var="labels=${{ github.event.inputs.labels }}" \
          -var="subscription_name=${{ github.event.inputs.subscription_name }}" \
          -var="ack_deadline_seconds=${{ github.event.inputs.ack_deadline_seconds }}" \
          -var="push_endpoint=${{ github.event.inputs.push_endpoint }}" \
          -var="push_attributes=${{ github.event.inputs.push_attributes }}" \
          -var="expiration_ttl=${{ github.event.inputs.expiration_ttl }}" \
          -var="min_retry_backoff=${{ github.event.inputs.min_retry_backoff }}" \
          -var="max_retry_backoff=${{ github.event.inputs.max_retry_backoff }}" \
          -var="enable_message_ordering=${{ github.event.inputs.enable_message_ordering }}"
